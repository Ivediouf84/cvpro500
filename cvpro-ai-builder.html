<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Création de CV - CV PRO 500</title>
    <link rel="stylesheet" href="styles.css?v=cvpro1">
    <link rel="stylesheet" href="cvpro-templates.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- html2pdf for client-side PDF generation -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        body { margin: 0; height: 100vh; display: flex; flex-direction: column; background: var(--body-bg); color: var(--text-main); overflow: hidden; }
        
        /* Top Navigation for Builder */
        .builder-nav { height: 60px; background: var(--surface); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 1.5rem; flex-shrink: 0; }
        .builder-nav-brand { font-weight: 800; font-size: 1.2rem; color: var(--text-main); text-decoration: none; display: flex; align-items: center; gap: 0.5rem; }
        .builder-actions { display: flex; gap: 0.75rem; }
        
        /* Main Layout */
        .builder-container { display: flex; flex: 1; overflow: hidden; }
        
        /* Left Panel - Wizard */
        .wizard-panel { width: 50%; max-width: 600px; background: var(--surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; z-index: 10; }
        .wizard-tabs { display: flex; overflow-x: auto; background: var(--background); border-bottom: 1px solid var(--border); padding: 0.5rem 1rem 0; flex-shrink: 0; }
        .tab-btn { padding: 0.75rem 1rem; border: none; background: transparent; color: var(--text-muted); cursor: pointer; border-bottom: 2px solid transparent; font-weight: 600; white-space: nowrap; font-size: 0.85rem; }
        .tab-btn.active { color: var(--primary); border-bottom-color: var(--primary); }
        .tab-btn:hover:not(.active) { color: var(--text-main); }
        
        .wizard-content { flex: 1; overflow-y: auto; padding: 1.5rem; }
        .step-section { display: none; animation: fadeIn 0.3s; }
        .step-section.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        
        .step-title { font-size: 1.25rem; font-weight: 700; margin-bottom: 1.5rem; color: var(--text-main); display: flex; justify-content: space-between; align-items: center; }
        
        /* Ultra-compact forms as per TerangaJob rules */
        .form-row { display: flex; gap: 1rem; margin-bottom: 0.75rem; }
        .form-group { margin-bottom: 0.75rem; flex: 1; }
        .form-group label { display: block; font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.5px; color: var(--text-muted); margin-bottom: 0.25rem; }
        .form-control { width: 100%; min-height: 35px; padding: 0.4rem 0.75rem; font-size: 0.85rem; border-radius: var(--radius-md); border: 1px solid var(--border); background: var(--background); color: var(--text-main); transition: var(--transition); }
        .form-control:focus { outline: none; border-color: var(--primary); }
        textarea.form-control { resize: vertical; min-height: 80px; }
        
        .dynamic-list { display: flex; flex-direction: column; gap: 1rem; }
        .dynamic-item { background: var(--background); border: 1px solid var(--border); border-radius: var(--radius-md); padding: 1rem; position: relative; }
        .btn-remove { position: absolute; top: 0.5rem; right: 0.5rem; background: transparent; border: none; color: #ef4444; cursor: pointer; font-size: 1rem; }
        .btn-add { display: inline-flex; align-items: center; gap: 0.5rem; background: transparent; border: 1px dashed var(--primary); color: var(--primary); padding: 0.5rem 1rem; border-radius: var(--radius-md); cursor: pointer; font-size: 0.85rem; font-weight: 600; width: 100%; justify-content: center; margin-top: 0.5rem; }
        .btn-add:hover { background: rgba(79, 70, 229, 0.1); }
        
        /* Right Panel - Preview */
        .preview-panel { flex: 1; background: #e2e8f0; display: flex; flex-direction: column; overflow: hidden; position: relative; }
        .preview-toolbar { padding: 0.75rem 1.5rem; background: var(--surface); border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
        .template-selector { display: flex; gap: 0.5rem; align-items: center; }
        .template-selector select { padding: 0.4rem; border-radius: var(--radius-md); border: 1px solid var(--border); background: var(--background); color: var(--text-main); font-size: 0.85rem; }
        
        .preview-scroll-area { flex: 1; overflow: auto; display: flex; justify-content: center; padding: 2rem; }
        
        /* A4 Page Container */
        .cv-page-container {
            width: 210mm;
            min-height: 297mm;
            background: white;
            color: #1a1a1a; /* Fix: prevent inheriting white text from dark theme */
            line-height: 1.3; /* Fix: tighter line spacing */
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            margin: 0 auto;
            position: relative;
            transform-origin: top center;
        }
        .cv-page-container h1, .cv-page-container h2, .cv-page-container h3, .cv-page-container h4, .cv-page-container h5, .cv-page-container h6 {
            color: #111827; /* Force dark headings by default */
            line-height: 1.2;
            margin-top: 1rem;
            margin-bottom: 0.3rem;
        }
        .cv-page-container p, .cv-page-container ul, .cv-page-container div {
            margin-bottom: 0.5rem;
        }
        
        /* Responsive Grid */
        @media (max-width: 1024px) {
            body { height: auto; overflow: visible; }
            .builder-container { flex-direction: column; overflow: visible; }
            .wizard-panel { width: 100%; max-width: 100%; height: auto; min-height: 60vh; border-right: none; border-bottom: 2px solid var(--primary); }
            .wizard-content { overflow: visible; }
            .preview-panel { height: auto; min-height: 60vh; overflow: visible; }
            .cv-page-container { transform: scale(0.6); } /* Scale down on smaller screens */
        }
        @media (max-width: 600px) {
            .form-row { flex-direction: column; gap: 0; }
            .cv-page-container { transform: scale(0.4); }
        }
        
        /* Payment Modal */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.6); backdrop-filter: blur(4px);
            display: none; align-items: center; justify-content: center; z-index: 1000;
        }
        .modal-overlay.active { display: flex; }
        .modal-content {
            background: var(--surface); width: 100%; max-width: 400px;
            border-radius: var(--radius-lg); padding: 2rem; position: relative;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4); border: 1px solid var(--border);
            text-align: center;
        }
        .modal-close {
            position: absolute; top: 1rem; right: 1rem; background: transparent;
            border: none; color: var(--text-muted); font-size: 1.2rem; cursor: pointer;
        }
        .payment-methods { display: flex; flex-direction: column; gap: 1rem; margin: 1.5rem 0; }
        .payment-method {
            border: 1px solid var(--border); padding: 1rem; border-radius: var(--radius-md);
            display: flex; align-items: center; justify-content: center; gap: 1rem;
            cursor: pointer; transition: all 0.2s; background: var(--background);
        }
        .payment-method:hover, .payment-method.selected {
            border-color: var(--primary); background: rgba(79, 70, 229, 0.1);
        }
        @media (max-width: 768px) {
            .hide-mobile { display: none !important; }
            .builder-actions { gap: 0.5rem !important; }
            .builder-nav { padding: 0 0.5rem; }
            .builder-nav-brand { font-size: 1rem; }
        }
        
        /* Style Panel */
        .style-panel { width: 300px; background: var(--surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; z-index: 10; padding: 1.5rem; overflow-y: auto; }
        .style-panel-title { font-size: 1.1rem; font-weight: 700; margin-bottom: 1.5rem; color: var(--text-main); display: flex; align-items: center; gap: 0.5rem; }
        .form-group { margin-bottom: 1rem; }
        .form-group label { display: flex; justify-content: space-between; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.5px; color: var(--text-muted); margin-bottom: 0.5rem; }
        .form-control { width: 100%; min-height: 35px; padding: 0.4rem 0.75rem; font-size: 0.85rem; border-radius: var(--radius-md); border: 1px solid var(--border); background: var(--background); color: var(--text-main); transition: var(--transition); }
        .form-control:focus { outline: none; border-color: var(--primary); }
        
        @media (max-width: 1024px) {
            .style-panel { width: 100%; border-right: none; border-bottom: 2px solid var(--primary); height: auto; max-height: none; }
        }
        
        /* Interactive Block Manipulation */
        .cv-block-selected {
            outline: 2px dashed var(--primary) !important;
            outline-offset: 2px;
            cursor: move;
        }
    </style>
</head>
<body class="dark-theme">

    <nav class="builder-nav">
        <a href="index.html" class="builder-nav-brand" title="Retour à l'accueil"><i class="fa-solid fa-arrow-left"></i> <span class="hide-mobile">CV PRO 500</span></a>
            <div class="builder-actions" style="display: flex; align-items: center; gap: 1rem;">
                <!-- User auth status -->
                <div id="builder-user-menu" style="display: none; align-items: center; gap: 1rem;">
                    <span id="builder-user-email" class="hide-mobile" style="font-size: 0.85rem; color: var(--text-muted);"></span>
                    <button onclick="handleLogout()" class="btn btn-ghost" style="color: #ef4444; padding: 0.4rem 0.8rem; border-radius: var(--radius-md); font-size: 0.85rem;" title="Déconnexion"><i class="fa-solid fa-right-from-bracket"></i></button>
                </div>
                <a href="auth.html" id="btn-login" class="btn btn-ghost" style="display: none; color: var(--text-main); font-size: 0.85rem;">Connexion</a>
                
                <!-- IA Button -->
                <button class="btn btn-ghost" style="color: var(--secondary); border: 1px solid var(--secondary); font-size: 0.85rem; padding: 0.4rem 0.8rem; border-radius: var(--radius-md);" title="Fonctionnalité Premium" onclick="window.location.href='index.html'">
                    <i class="fa-solid fa-wand-magic-sparkles"></i> <span class="hide-mobile">Importer ancien CV</span>
                </button>
                <button class="btn btn-primary" id="btn-open-payment" style="font-size: 0.85rem; padding: 0.4rem 1rem; border-radius: var(--radius-md); background: var(--grad-primary); border: none; color: white; cursor: pointer;" title="Télécharger">
                    <i class="fa-solid fa-download"></i> <span class="hide-mobile">Télécharger PDF (500F)</span>
                </button>
            </div>
    </nav>

    <div class="builder-container">
        
        <!-- Style Panel -->
        <div class="style-panel">
            <h3 class="style-panel-title"><i class="fa-solid fa-paintbrush"></i> Style du CV</h3>
            <div class="form-group">
                <label>Couleur du texte principal</label>
                <input type="color" id="style-text-color" class="form-control" value="#1a1a1a" style="height: 40px; padding: 2px; cursor: pointer;">
            </div>
            <div class="form-group">
                <label>Taille du texte globale <span id="val-font-size">14px</span></label>
                <input type="range" id="style-font-size" class="form-control" min="10" max="24" value="14" style="padding: 0;">
            </div>
            <div class="form-group">
                <label>Police de caractères</label>
                <select id="style-font-family" class="form-control">
                    <option value="inherit">Par défaut (Générée)</option>
                    <option value="'Inter', sans-serif">Inter (Moderne)</option>
                    <option value="'Roboto', sans-serif">Roboto</option>
                    <option value="'Open Sans', sans-serif">Open Sans</option>
                    <option value="Arial, sans-serif">Arial</option>
                    <option value="'Times New Roman', serif">Times New Roman</option>
                    <option value="'Courier New', monospace">Courier New</option>
                </select>
            </div>
            <div class="form-group">
                <label>Interligne (Aération) <span id="val-line-height">1.3</span></label>
                <input type="range" id="style-line-height" class="form-control" min="1" max="2.5" step="0.1" value="1.3" style="padding: 0;">
            </div>
            <div class="form-group">
                <label>Espace entre rubriques <span id="val-spacing">0.5rem</span></label>
                <input type="range" id="style-spacing" class="form-control" min="0" max="2" step="0.1" value="0.5" style="padding: 0;">
            </div>
            <button class="btn btn-primary" onclick="window.print()" style="width: 100%; margin-top: 1rem; background: var(--grad-primary); border: none; padding: 0.75rem; border-radius: var(--radius-md); color: white; cursor: pointer;">
                <i class="fa-solid fa-print"></i> Aperçu Impression
            </button>
        </div>

        <!-- Preview Panel -->
        <div class="preview-panel">
            <div class="preview-toolbar" style="justify-content: flex-end;">
                <div style="display:flex; gap:0.5rem;">
                    <button class="btn btn-ghost" onclick="zoomIn()" style="padding: 0.3rem 0.6rem; border-radius: 4px;"><i class="fa-solid fa-magnifying-glass-plus"></i></button>
                    <button class="btn btn-ghost" onclick="zoomOut()" style="padding: 0.3rem 0.6rem; border-radius: 4px;"><i class="fa-solid fa-magnifying-glass-minus"></i></button>
                </div>
            </div>
            
            <div class="preview-scroll-area">
                <!-- Wrapper for scaling -->
                <div id="cv-scale-wrapper" style="transform: scale(0.8); transform-origin: top center; transition: transform 0.2s;">
                    <!-- Actual A4 container to be converted to PDF -->
                    <div id="cv-document" class="cv-page-container cv-template-modern" contenteditable="true" style="outline: none;">
                        <!-- Content injected by JS -->
                    </div>
                </div>
            </div>
        </div>
        
    </div>

    <!-- Payment Modal -->
    <div class="modal-overlay" id="payment-modal">
        <div class="modal-content">
            <button class="modal-close" onclick="closePaymentModal()"><i class="fa-solid fa-xmark"></i></button>
            <h2 style="margin-top:0; font-size:1.5rem; color: var(--text-main);">Télécharger votre CV</h2>
            <p style="color:var(--text-muted); font-size:0.9rem; margin-bottom:1.5rem;">Un paiement unique de <strong>500 FCFA</strong> est requis pour générer le PDF haute qualité.</p>
            
            <div class="payment-methods">
                <div class="payment-method selected" onclick="selectPayment(this)">
                    <span style="background: #1C1CFF; color: white; padding: 0.2rem 0.5rem; border-radius: 4px; font-weight: bold; font-size: 0.8rem;">WAVE</span>
                    <span style="color: var(--text-main);">Wave Sénégal</span>
                </div>
                <div class="payment-method" onclick="selectPayment(this)">
                    <span style="background: #FF6600; color: white; padding: 0.2rem 0.5rem; border-radius: 4px; font-weight: bold; font-size: 0.8rem;">Orange</span>
                    <span style="color: var(--text-main);">Orange Money</span>
                </div>
            </div>
            
            <button class="btn btn-primary" id="btn-confirm-payment" style="width:100%; padding:1rem; font-size:1.1rem; border-radius:var(--radius-md); border:none; background:var(--grad-primary); color:white; font-weight:bold; cursor:pointer;" onclick="processPayment()">
                Payer 500 FCFA et Télécharger
            </button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="cvpro-ai-app.js"></script>
</body>
</html>
